<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | The Keyframe Awards</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">Keyframe Awards</div>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/nominations">Nominations</a>
            <a href="/vote">Vote</a>
            <a href="/live">Live Stream</a>
            <a href="/about">About</a>
        </nav>
    </header>

    <section class="info-section" style="margin-top: 100px; min-height: 80vh;">
        <h2 style="margin-bottom: 20px; color: var(--neon-cyan);">Get in Touch</h2>
        <p style="margin-bottom: 40px;">Have questions regarding nominations, sponsorship, or technical issues? Send us a message.</p>

        <div style="max-width: 500px; margin: 0 auto; background: var(--royal-purple); border: 1px solid rgba(157, 0, 255, 0.3); border-radius: 12px; padding: 30px; text-align: left;">
            <form id="contact-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="contact-name" required placeholder="Your Name">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="contact-email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label>Message</label>
                    <textarea id="contact-message" required placeholder="How can we help you?" style="background: rgba(13, 0, 26, 0.6); border: 1px solid rgba(157, 0, 255, 0.4); padding: 12px; border-radius: 6px; color: white; font-size: 1rem; outline: none; height: 120px; resize: none; font-family: inherit;"></textarea>
                </div>
                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </div>
    </section>

    <!-- FOOTER -->
  <footer>
    <div class="footer-links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
      <a href="/cookies">Cookie Preferences</a>
      <a href="/contact">Contact Support</a>
    </div>
    <div class="social-icons">
      <a href="https://www.facebook.com/profile.php?id=61591758598232" target="_blank"><i class="fab fa-facebook"></i></a>
      <a href="https://www.instagram.com/keyframeawards" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.threads.net/@keyframeawards" target="_blank"><i class="fab fa-threads"></i></a>
      <a href="https://x.com/keyframeawards" target="_blank"><i class="fab fa-x-twitter"></i></a>
      <a href="https://www.tiktok.com/@keyframeawards" target="_blank"><i class="fab fa-tiktok"></i></a>
      <a href="https://www.youtube.com/@KeyframeAwards" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
    <div class="copyright">
      <p>&copy; 2026 The Keyframe Awards. All rights reserved.</p>
    </div>
  </footer>

  <!-- Firebase System Module Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB6PoUXyNIyWUfLcaoGQnUONz_21Tc_Gwg",
      authDomain: "keyframe-awards.firebaseapp.com",
      projectId: "keyframe-awards",
      storageBucket: "keyframe-awards.firebasestorage.app",
      messagingSenderId: "882083630221",
      appId: "1:882083630221:web:629df7642fdf822018a6c4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const authActions = document.getElementById('auth-header-actions');
    onAuthStateChanged(auth, (user) => {
      if (user) {
        authActions.innerHTML = `
          <span class="user-welcome">Active Account</span>
          <button class="btn-login" id="logout-btn">Log Out</button>
        `;
        document.getElementById('logout-btn').addEventListener('click', () => {
          signOut(auth).then(() => alert("Logged out!"));
        });
      } else {
        authActions.innerHTML = `
          <button class="btn-login" id="open-login">Login</button>
          <button class="btn-signup" id="open-signup">Sign Up</button>
        `;
        if (typeof window.attachModalTriggers === 'function') {
          window.attachModalTriggers();
        }
      }
    });
  </script>

  <!-- Local Interface Control Scripts -->
  <script>
    const menuToggle = document.getElementById('mobile-menu');
    const navLinks = document.querySelector('.nav-links');
    
    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      menuToggle.classList.toggle('is-active');
    });
  </script>
</body>
</html>
