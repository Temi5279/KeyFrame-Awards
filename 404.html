<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Frame Lost | The Keyframe Awards</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0a0118;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .glitch-code {
            font-size: 10rem;
            font-weight: 900;
            color: #ff007f;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.6), 0 0 40px rgba(0, 242, 254, 0.4);
            margin: 0;
            line-height: 1;
            font-family: monospace;
            letter-spacing: -5px;
        }
        .error-title {
            color: #00f2fe;
            font-size: 2.2rem;
            margin-top: 15px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .error-message {
            color: #aaa;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .btn-home {
            background: linear-gradient(135deg, #9d00ff, #ff007f);
            color: #fff;
            padding: 16px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.5);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
        }
        .btn-home:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.8);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1 class="glitch-code">404</h1>
        <h2 class="error-title">Frame Lost</h2>
        <p class="error-message">
            The sequence, link, or structural timeline you are attempting to locate does not exist on our servers. It might have been dropped, renamed, or moved entirely out of order.
        </p>
        <a href="/" class="btn-home">
            <i class="fas fa-arrow-left"></i> Return to Homepage
        </a>
    </div>

</body>
</html>
