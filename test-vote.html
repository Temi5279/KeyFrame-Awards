<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Test System | Keyframe Awards</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .test-container {
            max-width: 600px;
            margin: 120px auto 60px auto;
            padding: 30px;
            background: rgba(26, 0, 51, 0.5);
            border: 1px solid rgba(157, 0, 255, 0.2);
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.1);
        }
        
        .nominee-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(157, 0, 255, 0.2);
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 12px;
            transition: border-color 0.3s, transform 0.2s;
            cursor: pointer;
        }

        .nominee-box:hover {
            border-color: var(--neon-cyan);
            transform: scale(1.02);
        }

        .nominee-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nominee-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 8px rgba(255, 0, 127, 0.3);
        }

        .nominee-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            text-align: left;
        }

        .vote-btn {
            background: var(--neon-cyan);
            border: none;
            color: #000;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 20px;
            pointer-events: none; /* Clicking anywhere on the box votes */
        }

        /* Progress tracker bar */
        .progress-container {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 20px 0;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">Keyframe Test</div>
        <nav class="nav-links">
            <a href="index.html">Back Home</a>
        </nav>
    </header>

    <main class="test-container">
        <h2 class="animated-gradient-text" style="font-size: 2rem; margin-bottom: 10px;">Voting Test Portal</h2>
        
        <!-- Live Auth Status Block -->
        <div id="auth-status" style="margin: 20px 0; padding: 10px; border-radius: 8px; background: rgba(255, 0, 127, 0.1); border: 1px solid var(--neon-pink);">
            Checking account status...
        </div>

        <!-- Progress Tracker -->
        <div id="progress-wrapper" style="display: none;">
            <div class="progress-container">
                <div id="progress-indicator" class="progress-bar"></div>
            </div>
            <div id="category-step" style="font-size: 0.9rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px;">Category 1 of 3</div>
        </div>

        <div id="voting-booth" style="display: none;">
            <h3 id="current-category-title" style="color: var(--text-white); text-align: left; margin-top: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
                Category: Loading...
            </h3>
            
            <div id="nominee-list">
                <!-- Javascript will instantly draw nominees here -->
            </div>
        </div>

        <div id="completion-screen" style="display: none; padding: 40px 20px;">
            <i class="fa-solid fa-circle-check" style="font-size: 4rem; color: #00ff66; text-shadow: 0 0 15px rgba(0, 255, 102, 0.4); margin-bottom: 20px;"></i>
            <h3 style="color: #fff; font-size: 1.8rem; margin-bottom: 10px;">All Votes Submitted!</h3>
            <p style="color: #ccc; margin-bottom: 30px;">Your votes were securely updated in your Cloud Firestore database in the background.</p>
            <button class="vote-btn" style="pointer-events: auto;" onclick="window.location.reload()">Vote Again</button>
        </div>
    </main>

    <!-- FIREBASE AND TRANSITION SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyB6PoUXyNIyWUfLcaoGQnUONz_21Tc_Gwg", 
            authDomain: "keyframe-awards.firebaseapp.com", 
            projectId: "keyframe-awards", 
            storageBucket: "keyframe-awards.firebasestorage.app", 
            messagingSenderId: "882083630221", 
            appId: "1:882083630221:web:629df7642fdf822018a6c4" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentCategoryIndex = 0;

        // Our test categories database structure
        const votingCategories = [
            {
                id: "best_editing_craft",
                title: "Best Editing Craft",
                nominees: [
                    { name: "Creator Alpha", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80" },
                    { name: "Creator Beta", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=150&q=80" }
                ]
            },
            {
                id: "music_category",
                title: "Music Category",
                nominees: [
                    { name: "Sync Wizard", img: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=150&q=80" },
                    { name: "Lyric Master", img: "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=150&q=80" }
                ]
            },
            {
                id: "meme_and_viral",
                title: "Meme & Viral Culture",
                nominees: [
                    { name: "Shitpost King", img: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?auto=format&fit=crop&w=150&q=80" },
                    { name: "Trend Jumper", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=150&q=80" }
                ]
            }
        ];

        // Track user status
        onAuthStateChanged(auth, (user) => {
            const authStatus = document.getElementById('auth-status');
            const votingBooth = document.getElementById('voting-booth');
            const progressWrapper = document.getElementById('progress-wrapper');

            if (user) {
                currentUser = user;
                authStatus.style.borderColor = "var(--neon-cyan)";
                authStatus.style.background = "rgba(0, 240, 255, 0.1)";
                authStatus.innerHTML = `<span style="color: var(--neon-cyan)">✔ Logged in as: ${user.email}</span>`;
                votingBooth.style.display = "block";
                progressWrapper.style.display = "block";
                renderCategory(); // Show first category!
            } else {
                currentUser = null;
                authStatus.style.borderColor = "var(--neon-pink)";
                authStatus.style.background = "rgba(255, 0, 127, 0.1)";
                authStatus.innerHTML = `<span style="color: var(--neon-pink)">❌ You must be logged in to cast a test vote. Please log in on the home page first!</span>`;
                votingBooth.style.display = "none";
                progressWrapper.style.display = "none";
            }
        });

        // Draws the current category on screen
        function renderCategory() {
            if (currentCategoryIndex >= votingCategories.length) {
                // Done with all categories! Show final screen
                document.getElementById('voting-booth').style.display = "none";
                document.getElementById('progress-wrapper').style.display = "none";
                document.getElementById('completion-screen').style.display = "block";
                return;
            }

            const currentCat = votingCategories[currentCategoryIndex];
            
            // Update progress bar
            const percent = ((currentCategoryIndex) / votingCategories.length) * 100;
            document.getElementById('progress-indicator').style.width = `${percent}%`;
            document.getElementById('category-step').innerText = `Category ${currentCategoryIndex + 1} of ${votingCategories.length}`;

            // Update title
            document.getElementById('current-category-title').innerText = `Category: ${currentCat.title}`;

            // Redraw nominees list dynamically
            const listContainer = document.getElementById('nominee-list');
            listContainer.innerHTML = "";

            currentCat.nominees.forEach(nom => {
                const box = document.createElement('div');
                box.className = "nominee-box";
                box.innerHTML = `
                    <div class="nominee-info">
                        <img class="nominee-avatar" src="${nom.img}" alt="${nom.name}">
                        <span class="nominee-name">${nom.name}</span>
                    </div>
                    <button class="vote-btn">Vote</button>
                `;
                
                // Clicking the container votes and goes directly to the next screen!
                box.onclick = () => {
                    submitVoteInBackground(currentCat.id, nom.name);
                };

                listContainer.appendChild(box);
            });
        }

        // Silent Background submission
        async function submitVoteInBackground(categoryId, nomineeName) {
            if (!currentUser) return;

            // 1. Instantly transition UI so user experiences zero lag
            currentCategoryIndex++;
            renderCategory();

            // 2. Write to Firebase silently in the background
            try {
                // Log vote history for this user
                const userVoteRef = doc(db, "user_votes", currentUser.uid);
                setDoc(userVoteRef, {
                    votes: arrayUnion({
                        category: categoryId,
                        nominee: nomineeName,
                        timestamp: new Date().toISOString()
                    })
                }, { merge: true });

                // Increment vote total tally
                const tallyRef = doc(db, "tally", categoryId);
                setDoc(tallyRef, {
                    [nomineeName]: increment(1)
                }, { merge: true });

            } catch (error) {
                console.error("Silent background write failed: ", error);
            }
        }
    </script>
</body>
</html>
