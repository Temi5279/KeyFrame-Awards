<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nominations | Keyframe Awards</title>
    <!-- Link to your existing external stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ==================== MOBILE HAMBURGER NAVIGATION ==================== */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 1000;
        }

        /* Hamburger Icon Styling */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            border: none;
            background: transparent;
        }

        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background: #fff;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* Active Hamburger Animations */
        .hamburger.active span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
            background: var(--neon-pink, #ff007f);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
            background: var(--neon-cyan, #00f0ff);
        }

        /* Responsive Styles for Navbar */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(15, 2, 28, 0.95);
                border-bottom: 2px solid rgba(157, 0, 255, 0.2);
                padding: 20px 0;
                text-align: center;
                gap: 15px;
            }

            .nav-links.active {
                display: flex;
            }
        }

        /* ==================== GLOWING CUSTOM TOAST NOTIFICATIONS ==================== */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            min-width: 300px;
            max-width: 400px;
            padding: 16px 20px;
            background: rgba(15, 2, 28, 0.9);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.2);
            color: #fff;
            font-family: sans-serif;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: auto;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
            position: relative;
            overflow: hidden;
        }

        /* Beautiful glowing gradient bar at the bottom of the toast */
        .toast::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--neon-pink, #ff007f), var(--neon-cyan, #00f0ff));
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success {
            border: 1px solid rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        .toast.error {
            border: 1px solid rgba(255, 0, 127, 0.4);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.15);
        }

        .toast-close {
            background: transparent;
            border: none;
            color: #aaa;
            font-size: 1.2rem;
            cursor: pointer;
            padding-left: 10px;
        }

        .toast-close:hover {
            color: #fff;
        }

        /* ==================== NOMINATIONS DESIGN WRAPPER ==================== */
        .nominations-container {
            max-width: 800px;
            margin: 120px auto 60px auto;
            padding: 30px;
            background: rgba(26, 0, 51, 0.5);
            border: 1px solid rgba(157, 0, 255, 0.2);
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- Floating Custom Toast Notifications Container -->
    <div id="toast-container"></div>

    <!-- Navigation Header -->
    <header class="navbar">
        <div class="logo">Keyframe Awards</div>
        
        <!-- Mobile Hamburger Button -->
        <button class="hamburger" id="hamburger-menu" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav class="nav-links" id="nav-links-menu">
            <a href="index.html">Home</a>
            <a href="nominations.html" class="active">Nominations</a>
            <a href="blog.html">Blog</a>
        </nav>
    </header>

    <main class="nominations-container">
        <h1 class="animated-gradient-text" style="font-size: 2.5rem; margin-bottom: 15px;">Submit Nominations</h1>
        <p style="color: #ccc; font-size: 1rem; margin-bottom: 30px;">Who ruled the creative spaces this year? Let us know below!</p>

        <!-- Dummy form for layout testing -->
        <form id="nomination-form" onsubmit="handleNominationSubmit(event)">
            <div style="margin-bottom: 20px; text-align: left;">
                <label style="color: #fff; display: block; margin-bottom: 8px;">Category Group</label>
                <select style="width: 100%; padding: 12px; border-radius: 8px; background: #22003c; border: 1px solid rgba(157, 0, 255, 0.4); color: #fff;">
                    <option>🎬 Creative & Editing Zone</option>
                    <option>🎵 Music Zone</option>
                    <option>🎮 Gaming & Streaming Zone</option>
                </select>
            </div>
            <div style="margin-bottom: 25px; text-align: left;">
                <label style="color: #fff; display: block; margin-bottom: 8px;">Your Nominee (Channel Name or @handle)</label>
                <input type="text" placeholder="e.g., @skew_1" required style="width: 100%; padding: 12px; border-radius: 8px; background: #22003c; border: 1px solid rgba(157, 0, 255, 0.4); color: #fff; box-sizing: border-box;">
            </div>
            <button type="submit" class="cta-btn" style="background: linear-gradient(90deg, var(--neon-pink, #ff007f), var(--neon-cyan, #00f0ff)); color: #fff; border: none; padding: 12px 30px; font-weight: bold; border-radius: 25px; cursor: pointer; text-shadow: 0 0 5px rgba(0,0,0,0.5);">
                Submit Nomination
            </button>
        </form>
    </main>

    <!-- UI Interaction Scripts -->
    <script>
        // 1. MOBILE HAMBURGER MENU INTERACTION
        const hamburger = document.getElementById('hamburger-menu');
        const navLinks = document.getElementById('nav-links-menu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // Close menu if a user clicks a link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });

        // 2. CUSTOM NEON GRADIENT NOTIFICATION ENGINE
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            
            // Create the toast element
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${message}</span>
                <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
            `;
            
            container.appendChild(toast);
            
            // Trigger animation slide-in
            setTimeout(() => {
                toast.classList.add('show');
            }, 100);
            
            // Auto-remove toast after 4 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.remove();
                }, 400); // Wait for transition out to finish
            }, 4000);
        }

        // Example trigger for nomination submit
        function handleNominationSubmit(event) {
            event.preventDefault();
            // Call our fancy toast!
            showToast("✨ Nomination submitted successfully! Thank you for participating.", "success");
            event.target.reset();
        }
    </script>
</body>
</html>
